<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple flat design - no gradients, no shadows -->
  
  <!-- Four equal segments - flat colors -->
  <g transform="translate(20, 20)">
    <!-- Top-left quarter - Blue -->
    <path d="M 0,0 L -18,-18 A 18,18 0 0,1 18,-18 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Top-right quarter - White with blue tint -->
    <path d="M 0,0 L 18,-18 A 18,18 0 0,1 18,18 Z" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Bottom-right quarter - Blue -->
    <path d="M 0,0 L 18,18 A 18,18 0 0,1 -18,18 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Bottom-left quarter - White with blue tint -->
    <path d="M 0,0 L -18,18 A 18,18 0 0,1 -18,-18 Z" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Thin dividing lines for clarity -->
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#2B7AB5" stroke-width="0.5" opacity="0.3"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#2B7AB5" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
    
    <!-- Equal sign - simple and clean -->
    <rect x="-4" y="-2" width="8" height="1.2" fill="#2B7AB5" rx="0.6"/>
    <rect x="-4" y="0.8" width="8" height="1.2" fill="#2B7AB5" rx="0.6"/>
  </g>
  
  <!-- Outer circle border -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
</svg>